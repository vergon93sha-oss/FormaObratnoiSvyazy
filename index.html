<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Дегустационный лист мясной продукции</title>
    <style>
        /* Сброс базовых стилей */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: #2c3e50;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* Настройки фонового видео */
        .video-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            z-index: -1;
            overflow: hidden;
        }

        .video-bg video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.9; /* Мягкая прозрачность для светлого мрамора */
        }

        /* Контейнер опросника (эффект матового стекла) */
        .survey-container {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 16px;
            padding: 30px;
            width: 100%;
            max-width: 900px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        }

        h1 {
            text-align: center;
            margin-bottom: 25px;
            font-size: 24px;
            color: #1a252f;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Адаптивная таблица */
        .table-responsive {
            overflow-x: auto;
            margin-bottom: 25px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: #ffffff;
            font-size: 15px;
        }

        th, td {
            padding: 14px 10px;
            text-align: center;
            border-bottom: 1px solid #eef2f5;
        }

        th {
            background-color: #f8fafc;
            color: #34495e;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 13px;
            letter-spacing: 0.5px;
        }

        /* Выравнивание текста в первом столбце */
        td:first-child {
            text-align: left;
            font-weight: 500;
            color: #34495e;
            padding-left: 15px;
            width: 30%;
        }

        /* Стилизация радиокнопок */
        input[type="radio"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: #e74c3c; /* Красный мясной акцент для кнопок */
        }

        /* Поле для комментариев */
        .comment-section {
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #34495e;
        }

        textarea {
            width: 100%;
            height: 100px;
            padding: 12px;
            border: 1px solid #dcdde1;
            border-radius: 8px;
            resize: vertical;
            font-family: inherit;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
            background: rgba(255, 255, 255, 0.9);
        }

        textarea:focus {
            border-color: #e74c3c;
        }

        /* Кнопка отправки */
        .btn-submit {
            display: block;
            width: 100%;
            max-width: 250px;
            margin: 0 auto;
            padding: 14px;
            background-color: #e74c3c;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
            box-shadow: 0 4px 12px rgba(231, 76, 60, 0.2);
        }

        .btn-submit:hover {
            background-color: #c0392b;
        }

        .btn-submit:active {
            transform: scale(0.98);
        }

        /* Мобильная адаптация */
        @media (max-width: 600px) {
            .survey-container {
                padding: 15px;
            }
            h1 {
                font-size: 18px;
            }
            th, td {
                padding: 10px 5px;
                font-size: 13px;
            }
        }
    </style>
</head>
<body>

    <!-- Задний план: Ваше светлое видео с Pixabay -->
    <div class="video-bg">
        <video src="87786-602074234.mp4" autoplay muted loop playsinline></video>
    </div>

    <!-- Основной контент опросника -->
    <div class="survey-container">
        <h1>Дегустационный лист</h1>
        
        <form>
            <div class="table-responsive">
                <table>
                    <thead>
                        <tr>
                            <th>Показатели</th>
                            <th>5 (Отлично)</th>
                            <th>4 (Хорошо)</th>
                            <th>3 (Удовл.)</th>
                            <th>2 (Плохо)</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>Внешний вид</td>
                            <td><input type="radio" name="appearance" value="5"></td>
                            <td><input type="radio" name="appearance" value="4"></td>
                            <td><input type="radio" name="appearance" value="3"></td>
                            <td><input type="radio" name="appearance" value="2"></td>
                        </tr>
                        <tr>
                            <td>Консистенция</td>
                            <td><input type="radio" name="consistency" value="5"></td>
                            <td><input type="radio" name="consistency" value="4"></td>
                            <td><input type="radio" name="consistency" value="3"></td>
                            <td><input type="radio" name="consistency" value="2"></td>
                        </tr>
                        <tr>
                            <td>Запах</td>
                            <td><input type="radio" name="odor" value="5"></td>
                            <td><input type="radio" name="odor" value="4"></td>
                            <td><input type="radio" name="odor" value="3"></td>
                            <td><input type="radio" name="odor" value="2"></td>
                        </tr>
                        <tr>
                            <td>Вкус</td>
                            <td><input type="radio" name="taste" value="5"></td>
                            <td><input type="radio" name="taste" value="4"></td>
                            <td><input type="radio" name="taste" value="3"></td>
                            <td><input type="radio" name="taste" value="2"></td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <div class="comment-section">
                <label for="comments">Замечания и предложения:</label>
                <textarea id="comments" name="comments" placeholder="Напишите ваше мнение о продукте..."></textarea>
            </div>

            <button type="submit" class="btn-submit">Отправить оценку</button>
        </form>
    </div>

</body>
</html>
